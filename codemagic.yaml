          EOF

      - name: Build Android APK (Preview)
        script: |
          cd demo_flutter_app
          flutter build apk --release --dart-define-from-file=codemagic_defines.json

    artifacts:
      - demo_flutter_app/build/app/outputs/flutter-apk/app-release.apk
