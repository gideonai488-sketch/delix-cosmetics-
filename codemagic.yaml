            KEY_PASS="$(grep -E '^keyPassword=' "$KEY_PROPERTIES_FILE" | head -n1 | cut -d'=' -f2-)"
            KEY_ALIAS_NAME="$(grep -E '^keyAlias=' "$KEY_PROPERTIES_FILE" | head -n1 | cut -d'=' -f2-)"
            if [[ -z "$STORE_PASS" || -z "$KEY_ALIAS_NAME" ]]; then
