workflows:
  android_manual:
    name: Android Manual Build (AAB)
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      groups:
        - android_signing
      vars:
        PACKAGE_NAME: "app.lovable.c9b19c47b2f943d298800727dc0b62ee"

    scripts:
      - name: Install dependencies
        script: |
          cd demo_flutter_app
          flutter pub get

      - name: Configure Android signing
        script: |
          cp "$CM_BUILD_DIR/demo_flutter_app/signing_export/genesis-upload-keystore.jks" "$CM_BUILD_DIR/demo_flutter_app/android/upload-keystore.jks"
          STORE_PASS="${CM_KEYSTORE_PASSWORD:-Kwabena2026}"
          KEY_PASS="${CM_KEY_PASSWORD:-$STORE_PASS}"
          KEY_ALIAS_NAME="${CM_KEY_ALIAS:-upload}"
          keytool -list -keystore "$CM_BUILD_DIR/demo_flutter_app/android/upload-keystore.jks" -storepass "$STORE_PASS" -alias "$KEY_ALIAS_NAME"
          cat > "$CM_BUILD_DIR/demo_flutter_app/android/key.properties" <<EOF
          storePassword=$STORE_PASS
          keyPassword=$KEY_PASS
          keyAlias=$KEY_ALIAS_NAME
          storeFile=../upload-keystore.jks
          EOF

      - name: Run static analysis
        script: |
          cd demo_flutter_app
          flutter analyze

      - name: Build Android App Bundle
        script: |
          cd demo_flutter_app
          flutter build appbundle --release --dart-define-from-file=codemagic_defines.json

    artifacts:
      - demo_flutter_app/build/app/outputs/bundle/release/app-release.aab
      - demo_flutter_app/build/**/outputs/**/mapping.txt

    publishing:
      email:
        recipients:
          - gideonai488@gmail.com
        notify:
          success: true
          failure: true

  android_preview:
    name: Android Preview APK (Auto)
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      groups:
        - android_signing
      vars:
        PACKAGE_NAME: "app.lovable.c9b19c47b2f943d298800727dc0b62ee"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install dependencies
        script: |
          cd demo_flutter_app
          flutter pub get

      - name: Configure Android signing
        script: |
          cp "$CM_BUILD_DIR/demo_flutter_app/signing_export/genesis-upload-keystore.jks" "$CM_BUILD_DIR/demo_flutter_app/android/upload-keystore.jks"
          STORE_PASS="${CM_KEYSTORE_PASSWORD:-Kwabena2026}"
          KEY_PASS="${CM_KEY_PASSWORD:-$STORE_PASS}"
          KEY_ALIAS_NAME="${CM_KEY_ALIAS:-upload}"
          keytool -list -keystore "$CM_BUILD_DIR/demo_flutter_app/android/upload-keystore.jks" -storepass "$STORE_PASS" -alias "$KEY_ALIAS_NAME"
          cat > "$CM_BUILD_DIR/demo_flutter_app/android/key.properties" <<EOF
          storePassword=$STORE_PASS
          keyPassword=$KEY_PASS
          keyAlias=$KEY_ALIAS_NAME
          storeFile=../upload-keystore.jks
          EOF

      - name: Build Android APK (Preview)
        script: |
          cd demo_flutter_app
          flutter build apk --release --dart-define-from-file=codemagic_defines.json

    artifacts:
      - demo_flutter_app/build/app/outputs/flutter-apk/app-release.apk
