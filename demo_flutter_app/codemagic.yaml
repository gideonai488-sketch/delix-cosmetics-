workflows:
  android_manual:
    name: Android Manual Build (AAB)
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      groups:
        - app_secrets
        - android_signing
      vars:
        PACKAGE_NAME: "com.delix.cosmetics"

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Configure Android signing
        script: |
          keytool -list -keystore "$CM_BUILD_DIR/demo_flutter_app/android/upload-keystore.jks" -storepass "$CM_KEYSTORE_PASSWORD" -alias "$CM_KEY_ALIAS"
          cat > "$CM_BUILD_DIR/demo_flutter_app/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Run static analysis
        script: flutter analyze

      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=APP_API_BASE_URL=$APP_API_BASE_URL \
            --dart-define=PAYSTACK_PUBLIC_KEY=$PAYSTACK_PUBLIC_KEY

    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt

    publishing:
      email:
        recipients:
          - gideonai488@gmail.com
        notify:
          success: true
          failure: true
