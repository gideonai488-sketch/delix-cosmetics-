workflows:
  android_manual:
    name: Android Manual Build (AAB)
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      groups:
        - android_signing
      vars:
        PACKAGE_NAME: "com.delix.cosmetics"

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Configure Android signing
        script: |
          cp "$CM_BUILD_DIR/demo_flutter_app/signing_export/genesis-upload-keystore.jks" "$CM_BUILD_DIR/demo_flutter_app/android/upload-keystore.jks"
          keytool -list -keystore "$CM_BUILD_DIR/demo_flutter_app/android/upload-keystore.jks" -storepass "$CM_KEYSTORE_PASSWORD" -alias "$CM_KEY_ALIAS"
          cat > "$CM_BUILD_DIR/demo_flutter_app/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=../upload-keystore.jks
          EOF

      - name: Run static analysis
        script: flutter analyze

      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release --dart-define-from-file=codemagic_defines.json

    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt

    publishing:
      email:
        recipients:
          - gideonai488@gmail.com
        notify:
          success: true
          failure: true

  android_preview:
    name: Android Preview APK (Auto)
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      groups:
        - android_signing
      vars:
        PACKAGE_NAME: "com.delix.cosmetics"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Configure Android signing
        script: |
          cp "$CM_BUILD_DIR/demo_flutter_app/signing_export/genesis-upload-keystore.jks" "$CM_BUILD_DIR/demo_flutter_app/android/upload-keystore.jks"
          keytool -list -keystore "$CM_BUILD_DIR/demo_flutter_app/android/upload-keystore.jks" -storepass "$CM_KEYSTORE_PASSWORD" -alias "$CM_KEY_ALIAS"
          cat > "$CM_BUILD_DIR/demo_flutter_app/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=../upload-keystore.jks
          EOF

      - name: Build Android APK (Preview)
        script: |
          flutter build apk --release --dart-define-from-file=codemagic_defines.json

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
