workflows:
  android_manual:
    name: Android Manual Build (AAB)
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      groups:
        - android_signing
      vars:
        PACKAGE_NAME: "com.delix.cosmetics.app2026"

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Configure Android signing
        script: |
          APP_DIR="$CM_BUILD_DIR/demo_flutter_app"
          if [[ ! -d "$APP_DIR/android" ]]; then
            APP_DIR="$CM_BUILD_DIR"
          fi
          ANDROID_DIR="$APP_DIR/android"
          KEYSTORE_DEST="$ANDROID_DIR/upload-keystore.jks"
          KEY_PROPERTIES_FILE="$ANDROID_DIR/key.properties"

          if [[ -n "${CM_KEYSTORE_BASE64:-}" ]]; then
            if ! printf '%s' "$CM_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_DEST" 2>/dev/null; then
              printf '%s' "$CM_KEYSTORE_BASE64" | base64 -D > "$KEYSTORE_DEST"
            fi
          elif [[ -n "${CM_KEYSTORE_PATH:-}" && -f "$CM_KEYSTORE_PATH" ]]; then
            cp "$CM_KEYSTORE_PATH" "$KEYSTORE_DEST"
          elif [[ -f "$APP_DIR/signing_export/genesis-upload-keystore.jks" ]]; then
            cp "$APP_DIR/signing_export/genesis-upload-keystore.jks" "$KEYSTORE_DEST"
          else
            echo "No keystore source found. Set CM_KEYSTORE_BASE64 or CM_KEYSTORE_PATH."
            exit 1
          fi

          if [[ -n "${CM_KEYSTORE_PASSWORD:-}" ]]; then
            STORE_PASS="$CM_KEYSTORE_PASSWORD"
            KEY_PASS="${CM_KEY_PASSWORD:-$STORE_PASS}"
            KEY_ALIAS_NAME="${CM_KEY_ALIAS:-upload}"
          elif [[ -f "$KEY_PROPERTIES_FILE" ]]; then
            STORE_PASS="$(grep -E '^storePassword=' "$KEY_PROPERTIES_FILE" | head -n1 | cut -d'=' -f2-)"
            KEY_PASS="$(grep -E '^keyPassword=' "$KEY_PROPERTIES_FILE" | head -n1 | cut -d'=' -f2-)"
            KEY_ALIAS_NAME="$(grep -E '^keyAlias=' "$KEY_PROPERTIES_FILE" | head -n1 | cut -d'=' -f2-)"
            if [[ -z "$STORE_PASS" || -z "$KEY_ALIAS_NAME" ]]; then
              echo "Missing storePassword/keyAlias in $KEY_PROPERTIES_FILE"
              exit 1
            fi
            if [[ -z "$KEY_PASS" ]]; then
              KEY_PASS="$STORE_PASS"
            fi
          else
            STORE_PASS="${CM_DEFAULT_KEYSTORE_PASSWORD:-Kwabena2026}"
            KEY_PASS="${CM_DEFAULT_KEY_PASSWORD:-$STORE_PASS}"
            KEY_ALIAS_NAME="${CM_DEFAULT_KEY_ALIAS:-upload}"
            echo "CM_KEYSTORE_PASSWORD not set and $KEY_PROPERTIES_FILE not found. Using default signing fallback alias=$KEY_ALIAS_NAME."
          fi

          keytool -list -keystore "$KEYSTORE_DEST" -storepass "$STORE_PASS" -alias "$KEY_ALIAS_NAME"
          cat > "$ANDROID_DIR/key.properties" <<EOF
          storePassword=$STORE_PASS
          keyPassword=$KEY_PASS
          keyAlias=$KEY_ALIAS_NAME
          storeFile=../upload-keystore.jks
          EOF

      - name: Run static analysis
        script: flutter analyze

      - name: Resolve app version for CI build
        script: |
          APP_VERSION_LINE="$(grep -E '^version:' pubspec.yaml | head -n1 | cut -d':' -f2- | xargs)"
          APP_BUILD_NAME="${APP_VERSION_LINE%%+*}"
          APP_BUILD_NUMBER="${CM_BUILD_ID:-$(date +%s)}"
          {
            echo "APP_BUILD_NAME=$APP_BUILD_NAME"
            echo "APP_BUILD_NUMBER=$APP_BUILD_NUMBER"
          } >> "$CM_ENV"
          echo "Using build name: $APP_BUILD_NAME"
          echo "Using build number: $APP_BUILD_NUMBER"

      - name: Build Android App Bundle
        script: |
          flutter build appbundle \
            --release \
            --build-name="$APP_BUILD_NAME" \
            --build-number="$APP_BUILD_NUMBER" \
            --dart-define-from-file=codemagic_defines.json

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/**/outputs/**/mapping.txt

    publishing:
      email:
        recipients:
          - gideonai488@gmail.com
        notify:
          success: true
          failure: true

  android_preview:
